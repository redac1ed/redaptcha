services:
  redaptcha:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redaptcha
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.local
    environment:
      PORT: 3000
      # uncomment to share the redeem log
      # REDIS_URL: redis://redis:6379
    # depends_on:
    #   redis:
    #     condition: service_healthy
    restart: unless-stopped

